<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWANHEE // OS_V3.0</title>
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cursor"></div>

    <!-- Intro Section -->
    <div id="intro-screen">
        <h1 id="text-hello" class="chrome-text">hello</h1>
        <h1 id="text-hwanhee" class="chrome-text">i'm hwanhee</h1>
    </div>

    <!-- Desktop Section -->
    <div id="desktop">
        <div id="taskbar">
            <div id="start-btn">start</div>
            <div class="ml-4 text-white/70 mono text-[10px] hidden md:block">HWANHEE_CORE_CONNECTED</div>
            <div id="clock" class="ml-auto text-white mono font-bold pr-4">12:00 PM</div>
        </div>
    </div>

    <!-- Project Detail Section -->
    <div id="detail-view">
        <button onclick="closeDetail()" class="text-white mono mb-10 hover:text-pink-500">[ CLOSE_SESSION ]</button>
        <div id="detail-content">
            <h2 id="detail-title" class="chrome-text-detail">PROJECT</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-10">
                <div class="bg-white/5 p-10 backdrop-blur-md border border-white/10">
                    <p class="text-white text-xl leading-relaxed mb-6">하이퍼리얼리즘과 Y2K 감성이 결합된 차세대 디지털 인터페이스 프로젝트입니다.</p>
                    <div class="mono">STATUS: ARCHIVED_SUCCESSFULLY</div>
                </div>
                <div class="h-96 bg-zinc-900 border border-green-500/30">
                    <img id="detail-img" src="" class="w-full h-full object-cover" alt="">
                </div>
            </div>
        </div>
    </div>

    <!-- Local JS -->
    <script src="script.js"></script>
</body>
</html>
