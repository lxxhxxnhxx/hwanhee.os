<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWANHEE // OS_V3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --chrome: linear-gradient(180deg, #ffffff 0%, #e0e0e0 40%, #7a7a7a 50%, #d1d1d1 100%);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', sans-serif;
            cursor: none;
        }

        /* --- INTRO SCREEN (CLOUDS) --- */
        #intro-screen {
            position: fixed; inset: 0; z-index: 999;
            background-image: url('input_file_0.png'); /* 제공해주신 구름 이미지 */
            background-size: cover;
            background-position: center;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.5s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* 시네마틱 무빙 효과 */
        #intro-screen::before {
            content: ""; position: absolute; inset: 0;
            background: rgba(0, 51, 204, 0.15); /* 푸른빛 필터 */
            mix-blend-mode: overlay;
        }

        .chrome-text {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 7vw;
            text-transform: uppercase;
            background: var(--chrome);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)) drop-shadow(0 0 15px rgba(255,255,255,0.5));
            letter-spacing: -2px;
            transform: scaleY(1.1);
            opacity: 0;
            white-space: nowrap;
        }

        /* --- DESKTOP (XP HILL) --- */
        #desktop {
            width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070') no-repeat center center;
            background-size: cover;
            display: none; position: relative;
        }

        /* --- WINDOWS --- */
        .window {
            position: absolute; width: 320px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            transform-origin: center;
        }

        .window-header {
            background: linear-gradient(90deg, #0033CC 0%, #4287f5 100%);
            padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;
            cursor: grab; color: white; font-size: 11px; font-weight: bold;
            text-shadow: 1px 1px #000;
        }

        .window-body { padding: 15px; color: white; }

        .project-thumb {
            width: 100%; height: 160px; background: #000;
            border: 1px solid var(--neon-green);
            overflow: hidden; position: relative; margin-bottom: 12px;
        }

        .project-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .window:hover .project-thumb img { opacity: 1; transform: scale(1.1); filter: contrast(1.2) saturate(1.5); }

        /* --- UI --- */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: linear-gradient(180deg, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #1941a5 100%);
            display: flex; align-items: center; padding: 0 10px; z-index: 1000;
        }

        #start-btn {
            background: linear-gradient(180deg, #388e3c 0%, #4caf50 100%);
            padding: 4px 22px; border-radius: 0 15px 15px 0;
            color: white; font-style: italic; font-weight: 900;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5);
            cursor: pointer;
        }

        #cursor {
            width: 24px; height: 24px; background: var(--neon-green);
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; clip-path: polygon(0% 0%, 100% 70%, 40% 70%, 0% 100%);
        }

        #detail-view {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; display: none; padding: 5vw; overflow-y: auto;
        }

        .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--neon-green); }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <!-- 구름 배경 인트로 -->
    <div id="intro-screen">
        <h1 id="text-hello" class="chrome-text">hello</h1>
        <h1 id="text-hwanhee" class="chrome-text">i'm hwanhee</h1>
    </div>

    <!-- 메인 데스크탑 -->
    <div id="desktop">
        <div id="taskbar">
            <div id="start-btn">start</div>
            <div class="ml-4 text-white/70 mono text-[10px]">HWANHEE_CORE_CONNECTED</div>
            <div id="clock" class="ml-auto text-white mono font-bold pr-4">12:00 PM</div>
        </div>
    </div>

    <!-- 프로젝트 상세 페이지 -->
    <div id="detail-view">
        <button onclick="closeDetail()" class="text-white mono mb-10 hover:text-pink-500">[ CLOSE_SESSION ]</button>
        <div id="detail-content">
            <h2 id="detail-title" class="chrome-text" style="position:relative; opacity:1; font-size: 8vw;">PROJECT</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-10">
                <div class="bg-white/5 p-10 backdrop-blur-md border border-white/10">
                    <p class="text-white text-xl leading-relaxed mb-6">하이퍼리얼리즘과 Y2K 감성이 결합된 차세대 디지털 인터페이스 프로젝트입니다. 기술적 정교함과 시각적 혼돈 사이의 균형을 탐구합니다.</p>
                    <div class="mono">STATUS: ARCHIVED_SUCCESSFULLY</div>
                </div>
                <div class="h-96 bg-zinc-900 border border-green-500/30">
                    <img id="detail-img" src="" class="w-full h-full object-cover" alt="">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 커서 애니메이션
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        // 인트로 시퀀스: 구름 배경에서 순차적 텍스트 등장
        const tl = gsap.timeline();

        tl.to("#intro-screen", { backgroundPosition: "55% 50%", duration: 6, ease: "linear" }); // 배경 미세 움직임
        
        tl.to("#text-hello", { opacity: 1, scale: 1.1, duration: 1.2, ease: "power3.out" }, 0.5)
          .to("#text-hello", { opacity: 0, scale: 1.2, filter: "blur(20px)", duration: 0.8 }, 2.0)
          .to("#text-hwanhee", { opacity: 1, scale: 1.1, duration: 1.2, ease: "power3.out" }, 2.5)
          .to("#intro-screen", { 
              y: "-100%", 
              duration: 1.5, 
              ease: "expo.inOut",
              onComplete: () => {
                  document.getElementById('intro-screen').style.display = 'none';
                  document.getElementById('desktop').style.display = 'block';
                  initDesktop();
              }
          }, 4.5);

        // 시계
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 데스크탑 프로젝트 윈도우 생성
        const projects = [
            { name: "ARMAGEDDON_VFX", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600" },
            { name: "CYBER_HEART", img: "https://images.unsplash.com/photo-1633167606207-d840b5070fc2?q=80&w=600" },
            { name: "NEO_SEOUL", img: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=600" },
            { name: "LIQUID_METAL", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=600" }
        ];

        function initDesktop() {
            projects.forEach((p, i) => {
                setTimeout(() => createWindow(p, i), i * 300);
            });
        }

        function createWindow(project, index) {
            const win = document.createElement('div');
            win.className = 'window';
            const randomX = Math.random() * (window.innerWidth - 350);
            const randomY = Math.random() * (window.innerHeight - 400);
            win.style.left = `${randomX}px`;
            win.style.top = `${randomY}px`;
            win.style.zIndex = index + 10;

            win.innerHTML = `
                <div class="window-header">
                    <span>${project.name}.exe</span>
                    <div class="flex gap-1">
                        <div class="w-3 h-3 bg-yellow-400 rounded-full border border-black/10"></div>
                        <div class="w-3 h-3 bg-red-500 rounded-full border border-black/10 cursor-pointer"></div>
                    </div>
                </div>
                <div class="window-body" onclick="openDetail('${project.name}', '${project.img}')">
                    <div class="project-thumb">
                        <img src="${project.img}" alt="">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="mono text-[9px] opacity-50">VER_2.0.4</span>
                        <span class="mono text-[10px] text-white hover:text-green-400 cursor-pointer">EXPLORE →</span>
                    </div>
                </div>
            `;
            
            document.getElementById('desktop').appendChild(win);
            makeDraggable(win);
            gsap.from(win, { scale: 0.5, opacity: 0, duration: 0.8, ease: "elastic.out(1, 0.5)" });
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = el.querySelector('.window-header');
            header.onmousedown = (e) => {
                document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
                el.style.zIndex = 100;
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                };
                document.onmousemove = (e) => {
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    el.style.top = (el.offsetTop - pos2) + "px";
                    el.style.left = (el.offsetLeft - pos1) + "px";
                };
            };
        }

        function openDetail(name, img) {
            const detail = document.getElementById('detail-view');
            document.getElementById('detail-title').innerText = name;
            document.getElementById('detail-img').src = img;
            detail.style.display = 'block';
            gsap.fromTo(detail, { opacity: 0, scale: 1.1 }, { opacity: 1, scale: 1, duration: 0.5, ease: "power4.out" });
        }

        function closeDetail() {
            gsap.to("#detail-view", { opacity: 0, duration: 0.4, onComplete: () => {
                document.getElementById('detail-view').style.display = 'none';
            }});
        }
    </script>
</body>
</html>
