<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWANHEE // OS_V2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cursor"></div>

    <div id="loading-screen">
        <div id="glass-layer"></div>
        <h1 id="text-hello" class="chrome-text">hello</h1>
        <h1 id="text-hwanhee" class="chrome-text">i'm hwanhee</h1>
    </div>

    <div id="desktop">
        <div id="taskbar">
            <div id="start-btn">start</div>
            <div class="ml-auto flex gap-4 text-white mono text-[10px]">
                <span class="opacity-50">CPU: 12%</span>
                <span id="clock">12:00 PM</span>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <div class="flex justify-between items-start mb-20">
            <div class="mono text-zinc-500 text-xs">PROJECT_ID: <span id="project-id">001</span></div>
            <button onclick="closeDetail()" class="text-white mono hover:text-green-400">[ EXIT_SESSION ]</button>
        </div>
        <h2 id="detail-title" class="chrome-text" style="position:relative; opacity:1; font-size: 8vw; display:block;">TITLE</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-20 mt-20">
            <div class="space-y-6 text-white">
                <p class="text-xl leading-relaxed opacity-80">Hyper-focused digital execution combining Y2K aesthetics with modern high-end performance. Designed to break the grid while maintaining technical precision.</p>
                <div class="h-[1px] w-full bg-white/20"></div>
                <div class="flex gap-10 mono text-xs text-green-400">
                    <div>ROLE: LEAD_DESIGN</div>
                    <div>TECH: WEBGL / GSAP</div>
                </div>
            </div>
            <div class="h-96 bg-zinc-900 rounded-lg overflow-hidden border border-white/10">
                <img id="detail-img" src="" class="w-full h-full object-cover" alt="">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
